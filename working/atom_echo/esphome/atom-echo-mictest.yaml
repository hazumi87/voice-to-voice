# MIC-ISOLATION TEST build (web-claude point #3).
# Identical wiring to atom-echo-1.yaml, but the speaker / media_player are REMOVED
# so the I2S peripheral runs RX-ONLY -- no shared full-duplex. If the ICS43434
# reads real RMS here but not in the full config, the shared-bus duplex was the
# culprit and we engineer coexistence afterward. Mic stays on G19/G33/G23.
substitutions:
  name: atom-echo-1
  friendly_name: Atom Echo 1

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  min_version: 2025.5.0

esp32:
  board: m5stack-atom
  cpu_frequency: 240MHz
  framework:
    type: esp-idf

logger:
api:
ota:
  - platform: esphome
    id: ota_esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  fast_connect: true
  ap:
captive_portal:

button:
  - platform: factory_reset
    id: factory_reset_btn
    name: Factory reset
  - platform: template
    name: Start listening
    id: start_listening_btn
    on_press:
      - voice_assistant.start:

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO33
    i2s_bclk_pin: GPIO19

microphone:
  - platform: i2s_audio
    id: echo_microphone
    i2s_din_pin: GPIO23
    adc_type: external
    pdm: false
    bits_per_sample: 32bit
    channel: left
    sample_rate: 16000
    # DIAGNOSTIC: DC correction OFF so a constant DC bias is VISIBLE in the
    # stream. all-zero => dead/unpowered line; constant non-zero => powered+
    # clocked but misconfigured; varying => mic alive. (Re-enable for real use.)
    correct_dc_offset: false

# Mic-only: no media_player, no micro_wake_word. A run is started manually
# (template button over API, or a face-button tap) and streams to the bridge.
voice_assistant:
  id: va
  microphone:
    microphone: echo_microphone
    channels: 0
    gain_factor: 4

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO39
      inverted: true
    name: Button
    disabled_by_default: true
    id: echo_button
    on_multi_click:
      - timing:
          - ON for at least 50ms
          - OFF for at least 50ms
        then:
          - voice_assistant.start:
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn
